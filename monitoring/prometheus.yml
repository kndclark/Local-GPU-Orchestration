# GPU Orchestrator — Prometheus Scrape Configuration
#
# Targets use host.docker.internal to reach services running on the
# Docker host machine. Adjust static_configs if workers run on
# different machines.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── Control Plane ────────────────────────
  - job_name: "control_plane"
    metrics_path: "/metrics/"
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          component: "control_plane"

  # ── Worker Agents ────────────────────────
  # Add one target per worker agent. Workers expose /metrics on their
  # configured metrics_port (default 9101).
  - job_name: "worker_agent"
    static_configs:
      # Laptop (Windows host)
      - targets: ["host.docker.internal:9101"]
        labels:
          component: "worker_agent"
          machine: "laptop"
      # Desktop
      - targets: ["192.168.0.190:9101"]
        labels:
          component: "worker_agent"
          machine: "desktop"
      # Steam Deck
      - targets: ["192.168.0.234:9101"]
        labels:
          component: "worker_agent"
          machine: "steamdeck"
      - targets: ["192.168.0.108:9101"]
        labels:
          component: "worker_agent"
          machine: "rogallyx"
