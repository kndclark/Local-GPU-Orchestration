# GPU Orchestrator — Prometheus Scrape Configuration
#
# Targets use host.docker.internal to reach services running on the
# Docker host machine. Adjust static_configs if workers run on
# different machines.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── Control Plane ────────────────────────
  # Uses the Docker Compose service name when running the full stack.
  # Change to host.docker.internal:8080 if running Prometheus standalone.
  - job_name: "control_plane"
    metrics_path: "/metrics/"
    static_configs:
      - targets: ["control-plane:8080"]
        labels:
          component: "control_plane"

  # ── Worker Agents ────────────────────────
  # Targets are loaded dynamically from targets.json, which the control plane
  # rewrites whenever a worker registers (no manual configuration needed).
  #
  # refresh_interval forces Prometheus to periodically re-read the file. This
  # is required on Docker Desktop (Windows/Mac)
  - job_name: "worker_agent"
    file_sd_configs:
      - files:
        - "/etc/prometheus/targets.json"
        refresh_interval: 30s
